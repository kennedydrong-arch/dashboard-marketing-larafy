<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório de Marketing · LaraFy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef4f7;--card:#fff;--ink:#0d2029;--muted:#647883;--faint:#9cb0ba;--navy:#002e43;
 --cyan:#07e0ff;--cyan-ink:#0389a4;--line:#e2e9ee;--good:#12b981;--bad:#f2495b;--amber:#f59e0b;--roxo:#7c6cf0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.mono{font-variant-numeric:tabular-nums}
.wrap{max-width:1180px;margin:0 auto;padding:28px 24px 60px}
/* header */
.hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:24px}
.hd-l{display:flex;align-items:center;gap:16px}
.hd-logo{height:34px}
.hd-t{font-family:'Montserrat';font-weight:800;font-size:20px;color:var(--navy)}
.hd-t small{display:block;font-family:'Inter';font-weight:500;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.hd-r{text-align:right}
.hd-r .per{font-family:'Montserrat';font-weight:800;font-size:15px;color:var(--navy)}
.hd-r .sub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#1877F2;background:#eaf1fd;padding:4px 10px;border-radius:6px;margin-top:6px}
/* section */
.sec{margin-top:30px}
.sec-h{display:flex;align-items:center;gap:10px;font-family:'Montserrat';font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:14px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--line)}
/* KPI grid */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.kpi.hero{grid-column:span 2;background:var(--navy);border-color:var(--navy)}
.kpi .v{font-family:'Montserrat';font-weight:800;font-size:30px;letter-spacing:-.02em;color:var(--navy);line-height:1}
.kpi.hero .v{font-size:44px;color:#fff}
.kpi .k{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:8px}
.kpi.hero .k{color:rgba(255,255,255,.6)}
.kpi .sub{font-size:12px;color:var(--faint);margin-top:3px}
.kpi.hero .sub{color:rgba(255,255,255,.5)}
.kpi.acc .v{color:var(--cyan-ink)}
/* funil */
.funil{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.fn{flex:1;padding:16px 18px;position:relative}
.fn+.fn{border-left:1px solid var(--line)}
.fn .v{font-family:'Montserrat';font-weight:800;font-size:26px;color:var(--navy);line-height:1}
.fn .k{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:7px}
.fn .rate{position:absolute;top:50%;right:-1px;transform:translate(50%,-50%);z-index:2;background:var(--cyan);color:var(--navy);font-family:'Montserrat';font-weight:800;font-size:11px;padding:3px 7px;border-radius:20px}
/* chart */
.chart{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.bars{display:flex;align-items:flex-end;gap:3px;height:150px;margin-top:6px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:0;position:relative}
.bar .b{width:100%;background:var(--cyan);border-radius:2px 2px 0 0;min-height:2px}
.bar:hover .b{background:var(--cyan-ink)}
.chart-x{display:flex;gap:3px;margin-top:6px}
.chart-x span{flex:1;text-align:center;font-size:9px;color:var(--faint)}
/* tabela */
.tbl{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:right;padding:11px 14px;border-bottom:1px solid var(--line);background:#f7fafb}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border-bottom:none}
.tbl td.nome{font-weight:600;color:var(--ink);max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl td.big{font-family:'Montserrat';font-weight:800;color:var(--navy)}
.tbl tr:hover td{background:#f7fafb}
.pill{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--cyan-ink);background:#e2fbff;padding:2px 7px;border-radius:5px}
/* criativos cards */
.crigrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cri{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.cri .rk{font-family:'Montserrat';font-weight:800;font-size:12px;color:var(--cyan-ink)}
.cri .nome{font-weight:700;font-size:14px;color:var(--ink);margin:6px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cri .camp{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:12px}
.cri .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;border-top:1px solid var(--line);padding-top:11px}
.cri .m .mv{font-family:'Montserrat';font-weight:800;font-size:17px;color:var(--navy)}
.cri .m .mk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ft{margin-top:36px;text-align:center;font-size:12px;color:var(--faint)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi.hero{grid-column:span 2}.crigrid{grid-template-columns:1fr}.funil{flex-wrap:wrap}.fn{flex:1 1 45%}}
</style></head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-l"><img class="hd-logo" id="logo" alt="LaraFy"><div class="hd-t">Relatório de Marketing<small>Performance de mídia paga</small></div></div>
    <div class="hd-r"><div class="per" id="periodo">—</div><div class="sub" id="conta">—</div><div class="badge">● Meta Ads</div></div>
  </div>

  <div class="sec">
    <div class="sec-h">Visão geral</div>
    <div class="kpis" id="kpis"></div>
  </div>

  <div class="sec">
    <div class="sec-h">Funil · investimento → venda</div>
    <div class="funil" id="funil"></div>
  </div>

  <div class="sec">
    <div class="sec-h">Evolução · investimento diário</div>
    <div class="chart"><div class="bars" id="bars"></div><div class="chart-x" id="barsx"></div></div>
  </div>

  <div class="sec">
    <div class="sec-h">Campanhas</div>
    <div class="tbl"><table><thead><tr><th>Campanha</th><th>Investimento</th><th>Impressões</th><th>Cliques</th><th>CTR</th><th>Leads</th><th>CPL</th></tr></thead><tbody id="camps"></tbody></table></div>
  </div>

  <div class="sec">
    <div class="sec-h">Top criativos · por investimento</div>
    <div class="crigrid" id="cris"></div>
  </div>

  <div class="ft" id="ft">—</div>
</div>

function render(M){
document.getElementById('logo').src=LOGO;
const nf=n=>new Intl.NumberFormat('pt-BR').format(Math.round(n));
const brl=n=>n>=1e6?'R$ '+(n/1e6).toFixed(1).replace('.',',')+'M':n>=1e3?'R$ '+(n/1e3).toFixed(1).replace('.',',')+'k':'R$ '+nf(n);
const brl2=n=>'R$ '+n.toFixed(2).replace('.',',');
const pct=n=>n.toFixed(2).replace('.',',')+'%';
const mesd=s=>{const p=(s||'').split('-');return p[2]+'/'+p[1];};
const O=M.overview, C=M.cross;
document.getElementById('periodo').textContent=mesd(M.periodo.since)+' – '+mesd(M.periodo.until);
document.getElementById('conta').textContent='Conta '+M.conta+' · últimos '+M.dias+' dias';
document.getElementById('ft').textContent='Gerado em '+M.geradoEm+' · fonte Meta Ads + Leads2b/B4';

// KPIs
const kpis=[
 {k:'Investimento',v:brl(O.invest),cls:'hero',sub:M.dias+' dias'},
 {k:'Leads (Meta)',v:nf(O.leads),cls:'acc',sub:'CPL '+brl2(O.cpl)},
 {k:'Impressões',v:nf(O.impressoes)},
 {k:'Alcance',v:nf(O.alcance)},
 {k:'Cliques',v:nf(O.cliques)},
 {k:'CTR',v:pct(O.ctr)},
 {k:'CPC',v:brl2(O.cpc)},
 {k:'CPM',v:brl2(O.cpm)},
];
document.getElementById('kpis').innerHTML=kpis.map(x=>`<div class="kpi ${x.cls||''}"><div class="v mono">${x.v}</div><div class="k">${x.k}</div>${x.sub?`<div class="sub">${x.sub}</div>`:''}</div>`).join('');

// Funil comercial
const fstages=[
 {k:'Investimento',v:brl(O.invest)},
 {k:'Cliques',v:nf(O.cliques),rate:O.impressoes?pct(O.cliques/O.impressoes*100):''},
 {k:'Leads (Meta)',v:nf(O.leads),rate:O.cliques?pct(O.leads/O.cliques*100):''},
 {k:'Leads no CRM',v:nf(C.leadsCRM||0),rate:O.leads?pct((C.leadsCRM||0)/O.leads*100):''},
 {k:'Vendas',v:nf(C.vendas||0),rate:(C.leadsCRM)?pct((C.vendas||0)/C.leadsCRM*100):''},
];
document.getElementById('funil').innerHTML=fstages.map((s,i)=>`<div class="fn"><div class="v mono">${s.v}</div><div class="k">${s.k}</div>${i<fstages.length-1&&fstages[i+1].rate?`<span class="rate">${fstages[i+1].rate}</span>`:''}</div>`).join('')
 +`<div class="fn"><div class="v mono" style="color:var(--good)">${(C.roas||0).toFixed(1).replace('.',',')}x</div><div class="k">ROAS · CAC ${brl(C.cac||0)}</div></div>`;

// Evolução (barras)
const ev=M.evolucao, mx=Math.max(...ev.map(e=>e.invest),1);
document.getElementById('bars').innerHTML=ev.map(e=>`<div class="bar" title="${mesd(e.d)}: ${brl(e.invest)} · ${nf(e.leads)} leads"><div class="b" style="height:${Math.max(2,e.invest/mx*150)}px"></div></div>`).join('');
document.getElementById('barsx').innerHTML=ev.map((e,i)=>`<span>${i%Math.ceil(ev.length/10)===0?mesd(e.d):''}</span>`).join('');

// Campanhas
document.getElementById('camps').innerHTML=M.campanhas.map(c=>`<tr>
 <td class="nome">${c.nome||'—'}</td><td class="big">${brl(c.invest)}</td>
 <td>${nf(c.impressoes)}</td><td>${nf(c.cliques)}</td><td>${pct(c.ctr)}</td>
 <td><b>${nf(c.leads)}</b></td><td>${c.leads?brl2(c.cpl):'—'}</td></tr>`).join('');

// Criativos top 9
document.getElementById('cris').innerHTML=M.criativos.slice(0,9).map((c,i)=>`<div class="cri">
 <div class="rk">#${i+1}</div><div class="nome">${c.nome||'—'}</div><div class="camp">${c.campanha||''}</div>
 <div class="row">
  <div class="m"><div class="mv mono">${brl(c.invest)}</div><div class="mk">Investido</div></div>
  <div class="m"><div class="mv mono">${pct(c.ctr)}</div><div class="mk">CTR</div></div>
  <div class="m"><div class="mv mono">${nf(c.leads)}</div><div class="mk">Leads</div></div>
 </div></div>`).join('');
}
fetch('./mkt_metrics.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(render)
  .catch(e=>{document.getElementById('periodo').textContent='erro ao carregar dados';console.error(e);});
setInterval(()=>fetch('./mkt_metrics.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(render).catch(()=>{}),5*60*1000);
</script>
</body></html>
