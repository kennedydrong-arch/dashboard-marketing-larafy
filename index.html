<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório de Marketing · LaraFy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef4f7;--card:#fff;--ink:#0d2029;--muted:#647883;--faint:#9cb0ba;--navy:#002e43;
 --cyan:#07e0ff;--cyan-ink:#0389a4;--line:#e2e9ee;--soft:#f7fafb;--pillbg:#e2fbff;--hero:#002e43;--good:#12b981;--bad:#f2495b}
[data-theme="dark"]{--bg:#00141d;--card:#052c3f;--ink:#eaf6fb;--muted:#8aa7b3;--faint:#587886;--navy:#eaf6fb;
 --cyan:#22e0ff;--cyan-ink:#6fe8ff;--line:#0e394d;--soft:#07202e;--pillbg:#0a3346;--hero:#0a3346;--good:#3ad0a4;--bad:#ff8a9b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .3s}
.mono{font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:28px 24px 60px}
.hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
.hd-l{display:flex;align-items:center;gap:16px}
.hd-logo{height:34px}
[data-theme="dark"] .hd-logo{filter:brightness(0) invert(1)}
.hd-t{font-family:'Montserrat';font-weight:800;font-size:20px;color:var(--navy)}
.hd-t small{display:block;font-family:'Inter';font-weight:500;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.hd-r{display:flex;align-items:center;gap:14px}
.hd-info{text-align:right}
.hd-info .per{font-family:'Montserrat';font-weight:800;font-size:15px;color:var(--navy)}
.hd-info .sub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1877F2;background:#eaf1fd;padding:3px 9px;border-radius:6px;margin-top:5px}
[data-theme="dark"] .badge{background:#12283f}
.tgl{background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:16px;width:38px;height:38px;border-radius:9px;cursor:pointer;transition:all .15s}
.tgl:hover{border-color:var(--cyan);color:var(--ink)}
/* filtro */
.filterbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.fsel{font-family:'Inter';font-weight:600;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 14px;cursor:pointer;outline:none;min-width:280px}
.fsel:focus{border-color:var(--cyan)}
.flbl{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.sec{margin-top:28px}
.sec-h{display:flex;align-items:center;gap:10px;font-family:'Montserrat';font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:14px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--line)}
.sec-h .scope{font-family:'Inter';font-weight:700;font-size:11px;letter-spacing:0;text-transform:none;color:var(--cyan-ink);background:var(--pillbg);padding:2px 9px;border-radius:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.kpi.hero{grid-column:span 2;background:var(--hero);border-color:var(--hero)}
.kpi .v{font-family:'Montserrat';font-weight:800;font-size:30px;letter-spacing:-.02em;color:var(--navy);line-height:1}
.kpi.hero .v{font-size:44px;color:#fff}
.kpi .k{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:8px}
.kpi.hero .k{color:rgba(255,255,255,.6)}
.kpi .sub{font-size:12px;color:var(--faint);margin-top:3px}.kpi.hero .sub{color:rgba(255,255,255,.5)}
.kpi.acc .v{color:var(--cyan-ink)}
.funil{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.fn{flex:1;padding:16px 18px;position:relative}.fn+.fn{border-left:1px solid var(--line)}
.fn .v{font-family:'Montserrat';font-weight:800;font-size:26px;color:var(--navy);line-height:1}
.fn .k{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:7px}
.fn .rate{position:absolute;top:50%;right:-1px;transform:translate(50%,-50%);z-index:2;background:var(--cyan);color:#002e43;font-family:'Montserrat';font-weight:800;font-size:11px;padding:3px 7px;border-radius:20px}
.chart{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.bars{display:flex;align-items:flex-end;gap:3px;height:150px;margin-top:6px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.bar .b{width:100%;background:var(--cyan);border-radius:2px 2px 0 0;min-height:2px}
.bar:hover .b{background:var(--cyan-ink)}
.chart-x{display:flex;gap:3px;margin-top:6px}.chart-x span{flex:1;text-align:center;font-size:9px;color:var(--faint)}
.tbl{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:right;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--soft)}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border-bottom:none}
.tbl td.nome{font-weight:600;color:var(--ink);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl td.nome a{display:inline-flex;align-items:center;gap:6px}.tbl td.nome a:hover{color:var(--cyan-ink)}
.tbl td.nome .ext{color:var(--faint);font-size:11px}
.tbl td.big{font-family:'Montserrat';font-weight:800;color:var(--navy)}
.tbl tr.clik{cursor:pointer}.tbl tr.clik:hover td{background:var(--soft)}
.tbl tr.sel td{background:var(--pillbg)}
.crigrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cri{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;display:block;transition:border-color .15s}
.cri:hover{border-color:var(--cyan)}
.cri .top{display:flex;justify-content:space-between;align-items:center}
.cri .rk{font-family:'Montserrat';font-weight:800;font-size:12px;color:var(--cyan-ink)}
.cri .ext{font-size:12px;color:var(--faint)}
.cri .nome{font-weight:700;font-size:14px;color:var(--ink);margin:6px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cri .camp{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:12px}
.cri .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;border-top:1px solid var(--line);padding-top:11px}
.cri .m .mv{font-family:'Montserrat';font-weight:800;font-size:17px;color:var(--navy)}
.cri .m .mk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ft{margin-top:36px;text-align:center;font-size:12px;color:var(--faint)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi.hero{grid-column:span 2}.crigrid{grid-template-columns:1fr}.funil{flex-wrap:wrap}.fn{flex:1 1 45%}.fsel{min-width:0;flex:1}}
</style></head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-l"><img class="hd-logo" id="logo" alt="LaraFy"><div class="hd-t">Relatório de Marketing<small>Performance de mídia paga</small></div></div>
    <div class="hd-r">
      <div class="hd-info"><div class="per" id="periodo">—</div><div class="sub" id="conta">—</div><div class="badge">● Meta Ads</div></div>
      <button class="tgl" onclick="toggleTheme()" title="Tema">◐</button>
    </div>
  </div>

  <div class="filterbar">
    <span class="flbl">Campanha</span>
    <select class="fsel" id="fcamp"></select>
  </div>

  <div class="sec">
    <div class="sec-h">Visão geral <span class="scope" id="scope"></span></div>
    <div class="kpis" id="kpis"></div>
  </div>
  <div class="sec">
    <div class="sec-h">Funil · investimento → venda <span class="scope">conta · origem Meta</span></div>
    <div class="funil" id="funil"></div>
  </div>
  <div class="sec">
    <div class="sec-h">Evolução · investimento diário <span class="scope">conta</span></div>
    <div class="chart"><div class="bars" id="bars"></div><div class="chart-x" id="barsx"></div></div>
  </div>
  <div class="sec">
    <div class="sec-h">Campanhas <span class="scope">clique pra filtrar ↓</span></div>
    <div class="tbl"><table><thead><tr><th>Campanha</th><th>Investimento</th><th>Impressões</th><th>Cliques</th><th>CTR</th><th>Leads</th><th>CPL</th></tr></thead><tbody id="camps"></tbody></table></div>
  </div>
  <div class="sec">
    <div class="sec-h">Top criativos · por investimento <span class="scope" id="criscope"></span></div>
    <div class="crigrid" id="cris"></div>
  </div>
  <div class="ft" id="ft">—</div>
</div>

const p=new URLSearchParams(location.search);
let _t=null;try{_t=localStorage.getItem('mktTheme')}catch(e){}
if((p.get('theme')||_t||'light')==='dark')document.body.setAttribute('data-theme','dark');
function toggleTheme(){const dk=!document.body.hasAttribute('data-theme');
  if(dk)document.body.setAttribute('data-theme','dark');else document.body.removeAttribute('data-theme');
  try{localStorage.setItem('mktTheme',dk?'dark':'light')}catch(e){}}

const nf=n=>new Intl.NumberFormat('pt-BR').format(Math.round(n));
const brl=n=>n>=1e6?'R$ '+(n/1e6).toFixed(1).replace('.',',')+'M':n>=1e3?'R$ '+(n/1e3).toFixed(1).replace('.',',')+'k':'R$ '+nf(n);
const brl2=n=>'R$ '+(n||0).toFixed(2).replace('.',',');
const pct=n=>(n||0).toFixed(2).replace('.',',')+'%';
const mesd=s=>{const q=(s||'').split('-');return q[2]+'/'+q[1];};
let M=null, SEL=null;
const acct=x=>String(x||'').replace('act_','');
function campLink(id){return `https://business.facebook.com/adsmanager/manage/campaigns?act=${acct(M.accountId)}&selected_campaign_ids=${id}`;}
function adLink(id){return `https://business.facebook.com/adsmanager/manage/ads?act=${acct(M.accountId)}&selected_ad_ids=${id}`;}

function draw(){
  const c=SEL;                                  // campanha selecionada ou null
  const O=c?{invest:c.invest,impressoes:c.impressoes,alcance:c.alcance,cliques:c.cliques,
             ctr:c.ctr,cpc:c.cliques?c.invest/c.cliques:0,cpm:c.cpm,leads:c.leads,
             cpl:c.cpl}:M.overview;
  document.getElementById('scope').textContent=c?c.nome:'conta · '+M.dias+' dias';
  const kpis=[
   {k:'Investimento',v:brl(O.invest),cls:'hero',sub:M.dias+' dias'},
   {k:'Leads (Meta)',v:nf(O.leads),cls:'acc',sub:'CPL '+brl2(O.cpl)},
   {k:'Impressões',v:nf(O.impressoes)},{k:'Alcance',v:nf(O.alcance||0)},
   {k:'Cliques',v:nf(O.cliques)},{k:'CTR',v:pct(O.ctr)},
   {k:'CPC',v:brl2(O.cpc)},{k:'CPM',v:brl2(O.cpm)},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(x=>`<div class="kpi ${x.cls||''}"><div class="v mono">${x.v}</div><div class="k">${x.k}</div>${x.sub?`<div class="sub">${x.sub}</div>`:''}</div>`).join('');

  // funil (conta) — ad part usa a seleção; CRM part é canal (conta)
  const X=M.cross||{}, ov=M.overview, adO=c?O:ov;
  const fs=[
   {k:'Investimento',v:brl(adO.invest)},
   {k:'Cliques',v:nf(adO.cliques),rate:adO.impressoes?pct(adO.cliques/adO.impressoes*100):''},
   {k:'Leads (Meta)',v:nf(adO.leads),rate:adO.cliques?pct(adO.leads/adO.cliques*100):''},
   {k:'Leads no CRM',v:nf(X.leadsCRM||0),rate:ov.leads?pct((X.leadsCRM||0)/ov.leads*100):''},
   {k:'Vendas',v:nf(X.vendas||0),rate:X.leadsCRM?pct((X.vendas||0)/X.leadsCRM*100):''},
  ];
  document.getElementById('funil').innerHTML=fs.map((s,i)=>`<div class="fn"><div class="v mono">${s.v}</div><div class="k">${s.k}</div>${i<fs.length-1&&fs[i+1].rate?`<span class="rate">${fs[i+1].rate}</span>`:''}</div>`).join('')
   +`<div class="fn"><div class="v mono" style="color:var(--good)">${(X.roas||0).toFixed(1).replace('.',',')}x</div><div class="k">ROAS · fat ${brl(X.faturamento||0)}</div></div>`;

  // criativos (filtra por campanha)
  let cris=M.criativos.filter(a=>a.invest>0); if(c) cris=cris.filter(a=>a.campId===c.id);
  document.getElementById('criscope').textContent=cris.length+' criativos'+(c?'':' · todas as campanhas');
  document.getElementById('cris').innerHTML=cris.map((a,i)=>`<a class="cri" href="${adLink(a.id)}" target="_blank">
    <div class="top"><span class="rk">#${i+1}</span><span class="ext">abrir ↗</span></div>
    <div class="nome">${a.nome||'—'}</div><div class="camp">${a.campanha||''}</div>
    <div class="row">
     <div class="m"><div class="mv mono">${brl(a.invest)}</div><div class="mk">Investido</div></div>
     <div class="m"><div class="mv mono">${pct(a.ctr)}</div><div class="mk">CTR</div></div>
     <div class="m"><div class="mv mono">${nf(a.leads)}</div><div class="mk">Leads</div></div>
    </div></a>`).join('')||'<div style="color:var(--faint)">Sem criativos nessa campanha.</div>';

  // marca linha selecionada na tabela
  document.querySelectorAll('#camps tr').forEach(tr=>tr.classList.toggle('sel',c&&tr.dataset.id===c.id));
}

function render(m){
  M=m; document.getElementById('logo').src=LOGO;
  document.getElementById('periodo').textContent=mesd(M.periodo.since)+' – '+mesd(M.periodo.until);
  document.getElementById('conta').textContent='Conta '+M.conta+' · últimos '+M.dias+' dias';
  document.getElementById('ft').textContent='Gerado em '+M.geradoEm+' · fonte Meta Ads + Leads2b/B4';
  // dropdown de campanhas
  const sel=document.getElementById('fcamp');
  sel.innerHTML='<option value="">Todas as campanhas</option>'+M.campanhas.map(c=>`<option value="${c.id}">${c.nome} — ${brl(c.invest)}</option>`).join('');
  sel.onchange=()=>{SEL=M.campanhas.find(c=>c.id===sel.value)||null;draw();};
  // evolução (conta, fixa)
  const ev=M.evolucao, mx=Math.max(...ev.map(e=>e.invest),1);
  document.getElementById('bars').innerHTML=ev.map(e=>`<div class="bar" title="${mesd(e.d)}: ${brl(e.invest)} · ${nf(e.leads)} leads"><div class="b" style="height:${Math.max(2,e.invest/mx*150)}px"></div></div>`).join('');
  document.getElementById('barsx').innerHTML=ev.map((e,i)=>`<span>${i%Math.ceil(ev.length/10)===0?mesd(e.d):''}</span>`).join('');
  // tabela campanhas (link + clique filtra)
  document.getElementById('camps').innerHTML=M.campanhas.map(c=>`<tr class="clik" data-id="${c.id}">
    <td class="nome"><a href="${campLink(c.id)}" target="_blank" onclick="event.stopPropagation()">${c.nome||'—'} <span class="ext">↗</span></a></td>
    <td class="big">${brl(c.invest)}</td><td>${nf(c.impressoes)}</td><td>${nf(c.cliques)}</td>
    <td>${pct(c.ctr)}</td><td><b>${nf(c.leads)}</b></td><td>${c.leads?brl2(c.cpl):'—'}</td></tr>`).join('');
  document.querySelectorAll('#camps tr.clik').forEach(tr=>tr.onclick=()=>{
    SEL=(SEL&&SEL.id===tr.dataset.id)?null:M.campanhas.find(c=>c.id===tr.dataset.id);
    sel.value=SEL?SEL.id:''; draw();
  });
  draw();
}
fetch('./mkt_metrics.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(render)
  .catch(e=>{document.getElementById('periodo').textContent='erro ao carregar dados';console.error(e);});
setInterval(()=>fetch('./mkt_metrics.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(render).catch(()=>{}),5*60*1000);
</script>
</body></html>
